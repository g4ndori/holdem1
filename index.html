<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Chip Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Chip Counter</h1>
        <h2>made by Changeon</h2>
        <div id="pot-container">
            POT: <span id="pot">0</span> 🪙
        </div>
    </header>

    <main class="players">
        <div class="player">
            <h2>플레이어 1</h2>
            <p class="chip-count"><span id="chips1">5000</span></p>
            <div class="controls">
                <input type="number" id="bet1" value="100" min="1">
                <button class="btn bet-btn" onclick="bet(1)">베팅</button>
            </div>
            <button class="btn win-btn" onclick="winner(1)">승리</button>
        </div>

        <div class="player">
            <h2>플레이어 2</h2>
            <p class="chip-count"><span id="chips2">5000</span></p>
            <div class="controls">
                <input type="number" id="bet2" value="100" min="1">
                <button class="btn bet-btn" onclick="bet(2)">베팅</button>
            </div>
            <button class="btn win-btn" onclick="winner(2)">승리</button>
        </div>

        <div class="player">
            <h2>플레이어 3</h2>
            <p class="chip-count"><span id="chips3">5000</span></p>
            <div class="controls">
                <input type="number" id="bet3" value="100" min="1">
                <button class="btn bet-btn" onclick="bet(3)">베팅</button>
            </div>
            <button class="btn win-btn" onclick="winner(3)">승리</button>
        </div>

        <div class="player">
            <h2>플레이어 4</h2>
            <p class="chip-count"><span id="chips4">5000</span></p>
            <div class="controls">
                <input type="number" id="bet4" value="100" min="1">
                <button class="btn bet-btn" onclick="bet(4)">베팅</button>
            </div>
            <button class="btn win-btn" onclick="winner(4)">승리</button>
        </div>
    </main>

    <footer>
        <button class="btn reset-btn" onclick="resetGame()">게임 리셋</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>

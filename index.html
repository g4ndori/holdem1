<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .pot-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .pot-section .label {
            font-size: 11px;
            letter-spacing: 3px;
            color: #999;
        }

        .pot-section .value {
            font-size: 54px;
            font-weight: 200;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 30px;
            max-width: 360px;
            width: 100%;
        }

        .card {
            text-align: center;
        }

        .name {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        .chips {
            font-size: 36px;
            font-weight: 200;
            margin: 5px 0 15px 0;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        input {
            width: 60px;
            padding: 5px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-bottom-color: #000;
        }

        button {
            background: none;
            border: none;
            font-size: 13px;
            color: #000;
            cursor: pointer;
            padding: 5px;
        }

        button:hover {
            text-decoration: underline;
        }

        button.win {
            display: block;
            width: 100%;
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        button.win:hover {
            color: #000;
        }

        .reset {
            margin-top: 60px;
            color: red;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .reset:hover {
            color: #999;
        }
    </style>
</head>
<body>

    <div class="pot-section">
        <div class="label">POT</div>
        <div id="pot" class="value">0</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="name">P1</div>
            <div id="chips1" class="chips">5000</div>
            <div class="row">
                <input type="number" id="bet1" value="100">
                <button onclick="bet(1)">베팅</button>
            </div>
            <button class="win" onclick="winner(1)">승리</button>
        </div>

        <div class="card">
            <div class="name">P2</div>
            <div id="chips2" class="chips">5000</div>
            <div class="row">
                <input type="number" id="bet2" value="100">
                <button onclick="bet(2)">베팅</button>
            </div>
            <button class="win" onclick="winner(2)">승리</button>
        </div>

        <div class="card">
            <div class="name">P3</div>
            <div id="chips3" class="chips">5000</div>
            <div class="row">
                <input type="number" id="bet3" value="100">
                <button onclick="bet(3)">베팅</button>
            </div>
            <button class="win" onclick="winner(3)">승리</button>
        </div>

        <div class="card">
            <div class="name">P4</div>
            <div id="chips4" class="chips">5000</div>
            <div class="row">
                <input type="number" id="bet4" value="100">
                <button onclick="bet(4)">베팅</button>
            </div>
            <button class="win" onclick="winner(4)">승리</button>
        </div>
    </div>

    <button class="reset" onclick="resetGame()">RESET</button>

    <script>
        let pot = 0;
        let chips = { 1: 5000, 2: 5000, 3: 5000, 4: 5000 };

        function bet(player) {
            const amount = parseInt(document.getElementById("bet" + player).value);

            if (isNaN(amount) || amount <= 0 || amount > chips[player]) {
                alert("금액 오류");
                return;
            }

            chips[player] -= amount;
            pot += amount;

            document.getElementById("chips" + player).textContent = chips[player];
            document.getElementById("pot").textContent = pot;
        }

        function winner(player) {
            if (pot <= 0) return;

            chips[player] += pot;
            pot = 0;

            document.getElementById("chips" + player).textContent = chips[player];
            document.getElementById("pot").textContent = pot;
        }
        

        function resetGame() {
            if (!confirm("Wanna Reset?")) return;

            for (let i = 1; i <= 4; i++) {
                chips[i] = 5000;
                document.getElementById("chips" + i).textContent = 5000;
                document.getElementById("bet" + i).value = 100;
            }
            pot = 0;
            document.getElementById("pot").textContent = 0;
        }
    </script>
</body>
</html>

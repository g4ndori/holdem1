<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Chip Counter</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: gold;
}

#pot-container {
    margin: 20px 0;
    font-size: 24px;
    font-weight: bold;
}

.players {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.player {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 15px;
    width: 220px;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

input {
    width: 80px;
    padding: 5px;
    margin: 5px;
}

button {
    padding: 8px 12px;
    margin: 3px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.bet-btn {
    background: #3498db;
    color: white;
}

.win-btn {
    background: #27ae60;
    color: white;
}

.reset-btn {
    background: #e74c3c;
    color: white;
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>🃏 Poker Chip Counter</h1>

<div id="pot-container">
    팟: <span id="pot">0</span> 칩
</div>

<div class="players">

    <div class="player">
        <h2>플레이어 1</h2>
        <p>칩: <span id="chips1">5000</span></p>
        <input type="number" id="bet1" value="100" min="1">
        <br>
        <button class="bet-btn" onclick="bet(1)">베팅</button>
        <button class="win-btn" onclick="winner(1)">승리 🏆</button>
    </div>

    <div class="player">
        <h2>플레이어 2</h2>
        <p>칩: <span id="chips2">5000</span></p>
        <input type="number" id="bet2" value="100" min="1">
        <br>
        <button class="bet-btn" onclick="bet(2)">베팅</button>
        <button class="win-btn" onclick="winner(2)">승리 🏆</button>
    </div>

    <div class="player">
        <h2>플레이어 3</h2>
        <p>칩: <span id="chips3">5000</span></p>
        <input type="number" id="bet3" value="100" min="1">
        <br>
        <button class="bet-btn" onclick="bet(3)">베팅</button>
        <button class="win-btn" onclick="winner(3)">승리 🏆</button>
    </div>

    <div class="player">
        <h2>플레이어 4</h2>
        <p>칩: <span id="chips4">5000</span></p>
        <input type="number" id="bet4" value="100" min="1">
        <br>
        <button class="bet-btn" onclick="bet(4)">베팅</button>
        <button class="win-btn" onclick="winner(4)">승리 🏆</button>
    </div>

</div>

<button class="reset-btn" onclick="resetGame()">
    게임 리셋
</button>

<script>
let pot = 0;

let chips = {
    1: 5000,
    2: 5000,
    3: 5000,
    4: 5000
};

function bet(player) {
    const amount = parseInt(
        document.getElementById("bet" + player).value
    );

    if (
        isNaN(amount) ||
        amount <= 0 ||
        amount > chips[player]
    ) {
        alert("베팅 금액이 올바르지 않습니다.");
        return;
    }

    chips[player] -= amount;
    pot += amount;

    document.getElementById("chips" + player).textContent =
        chips[player];

    document.getElementById("pot").textContent =
        pot;
}

function winner(player) {
    if (pot <= 0) {
        alert("팟에 칩이 없습니다.");
        return;
    }

    chips[player] += pot;

    alert(
        "플레이어 " +
        player +
        " 승리!\n팟 " +
        pot +
        "칩을 획득했습니다."
    );

    pot = 0;

    document.getElementById("chips" + player).textContent =
        chips[player];

    document.getElementById("pot").textContent =
        pot;
}

function resetGame() {
    for (let i = 1; i <= 4; i++) {
        chips[i] = 5000;
        document.getElementById("chips" + i).textContent =
            5000;
        document.getElementById("bet" + i).value = 100;
    }

    pot = 0;
    document.getElementById("pot").textContent = 0;
}
</script>

</body>
</html>
